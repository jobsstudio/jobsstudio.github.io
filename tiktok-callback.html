<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TikTok OAuth Callback - JobsStudio</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; max-width: 720px; margin: 60px auto; padding: 0 20px; line-height: 1.6; color: #1a1a1a; }
    h1 { color: #FF6B1A; }
    .box { background: #f6f6f6; border: 1px solid #ddd; border-radius: 8px; padding: 20px; margin: 20px 0; word-break: break-all; }
    .code { font-family: "Consolas", "Monaco", monospace; font-size: 14px; background: #fff; padding: 12px; border: 1px solid #ddd; border-radius: 4px; }
    button { background: #FF6B1A; color: white; border: none; padding: 12px 24px; border-radius: 4px; font-size: 16px; cursor: pointer; }
    button:hover { background: #e85b0a; }
    .ok { color: #2c7a2c; }
    .err { color: #c00; }
    .step { margin: 16px 0; padding: 12px; background: #fff8f0; border-left: 4px solid #FF6B1A; }
  </style>
</head>
<body>
  <h1>TikTok OAuth Callback</h1>
  <div id="content">Loading...</div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const code = params.get('code');
    const state = params.get('state');
    const error = params.get('error');
    const errorDesc = params.get('error_description');
    const scopes = params.get('scopes');

    const c = document.getElementById('content');

    if (error) {
      c.innerHTML = `
        <p class="err"><strong>Error:</strong> ${error}</p>
        <p>${errorDesc || ''}</p>
        <p>Please return to the app and try again.</p>`;
    } else if (code) {
      c.innerHTML = `
        <p class="ok"><strong>Authorization successful.</strong></p>

        <div class="step">
          <strong>Step 1:</strong> Copy the authorization code below.
        </div>

        <p><strong>Authorization Code:</strong></p>
        <div class="box">
          <div class="code" id="code-text">${code}</div>
          <button onclick="copyCode()" style="margin-top:12px;">Copy code</button>
          <span id="copy-status" style="margin-left:12px;"></span>
        </div>

        ${scopes ? `<p><strong>Granted scopes:</strong> ${scopes}</p>` : ''}
        ${state ? `<p style="color:#666;font-size:14px;"><strong>State:</strong> ${state}</p>` : ''}

        <div class="step">
          <strong>Step 2:</strong> Send the code to the JobsStudio backend to exchange for an access token.
          <br>Use the token-exchange endpoint:
          <div class="code" style="margin-top:8px;">
            POST http://localhost:8000/api/auth/tiktok/exchange<br>
            Content-Type: application/json<br>
            <br>
            { "code": "${code}" }
          </div>
        </div>
      `;
    } else {
      c.innerHTML = `<p class="err">No authorization code received. This page should only be visited as a TikTok OAuth redirect.</p>`;
    }

    function copyCode() {
      const txt = document.getElementById('code-text').textContent;
      navigator.clipboard.writeText(txt).then(() => {
        document.getElementById('copy-status').textContent = 'Copied!';
        setTimeout(() => { document.getElementById('copy-status').textContent = ''; }, 2000);
      });
    }
  </script>
</body>
</html>
